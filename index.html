<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Global Asset Ledger — platform for tracking, searching, and analyzing largee-scale financial asset portfolios." />
  <meta name="theme-color" content="#000000" />
  <meta property="og:title" content="Global Asset Ledger" />
  <meta property="og:description" content="Institutional-grade asset management platform." />
  <title>Global Asset Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- initial loader -->
  <style>
    #root-loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
    }

    #root-loader .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid #1f1f1f;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    #root-loader .label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body style="margin:0;background:#000;">
  <!-- Shown immediately by the browser, before JS loads or executes.
         React's createRoot().render() replaces #root contents, removing this automatically. -->
  <div id="root">
    <div id="root-loader">
      <div class="spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
